# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      serverUrl:
        type: string
        default: "https://shoptera.ai/api/mcp"
        description: Shoptera MCP server URL. Override only for custom deployments.
  commandFunction:
    |-
    (config) => ({ command: 'npx', args: ['-y', 'mcp-remote', config.serverUrl || 'https://shoptera.ai/api/mcp'] })
  exampleConfig:
    serverUrl: "https://shoptera.ai/api/mcp"
